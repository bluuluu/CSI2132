services:
  - type: web
    name: csi2132-ehotels
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: AUTO_INIT_DB
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: csi2132-ehotels-db
          property: connectionString

databases:
  - name: csi2132-ehotels-db
    plan: free
